{% extends "base.html" %}
{% block content %}
<h2>Cyber Awareness Quiz</h2>

<form id="quizForm" class="quiz-form">
  <div class="question">
    <p>1. What is phishing?</p>
    <label><input type="radio" name="q1" value="a"> A type of cyber attack</label><br>
    <label><input type="radio" name="q1" value="b"> An antivirus software</label>
  </div>

  <div class="question">
    <p>2. Should you share your OTP with anyone?</p>
    <label><input type="radio" name="q2" value="a"> Yes</label><br>
    <label><input type="radio" name="q2" value="b"> No</label>
  </div>

  <div class="question">
    <p>3. What is the safest way to create a password?</p>
    <label><input type="radio" name="q3" value="a"> Use your name and birthday</label><br>
    <label><input type="radio" name="q3" value="b"> Use random characters and symbols</label>
  </div>

  <button id="submitQuiz" type="button" class="btn">Submit</button>
</form>

<p id="result" style="margin-top: 20px; font-weight: bold;"></p>

<script>
document.getElementById("submitQuiz").addEventListener("click", function() {
  const q1 = document.querySelector('input[name="q1"]:checked');
  const q2 = document.querySelector('input[name="q2"]:checked');
  const q3 = document.querySelector('input[name="q3"]:checked');
  const result = document.getElementById("result");

  if (!q1 || !q2 || !q3) {
    result.textContent = "Please answer all questions before submitting.";
    result.style.color = "red";
    return;
  }

  let score = 0;
  if (q1.value === "a") score++;
  if (q2.value === "b") score++;
  if (q3.value === "b") score++;

  result.style.color = "green";
  result.textContent = `You scored ${score}/3. ${score === 3 ? "Excellent cybersecurity awareness!" : "Keep learning to improve your awareness."}`;
});
</script>
{% endblock %}
